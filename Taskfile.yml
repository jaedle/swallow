version: '3'

tasks:
  default:
    deps: [ci]

  fmt:
    cmds:
      - go fmt ./...

  lint:
    cmds:
      - golangci-lint run

  test:
    cmds:
      - go test ./...

  build:
    env:
      CGO_ENABLED: '0'
    cmds:
      - go build -ldflags='-s -w' -o out/swallow ./cmd/swallow

  ci:
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: build

  manage-dependencies:
    cmds:
      - go mod verify
      - go mod tidy
      - go mod vendor

  release:
    cmds:
      - npm clean-install
      - npx semantic-release

  release:publish:
    desc: Build versioned release tarballs (called by semantic-release prepare)
    requires:
      vars: [VERSION]
    env:
      CGO_ENABLED: '0'
    cmds:
      - for:
          matrix:
            OS: [linux, darwin]
            ARCH: [amd64, arm64]
        cmd: >-
          GOOS={{.ITEM.OS}} GOARCH={{.ITEM.ARCH}}
          go build -trimpath -ldflags='-s -w -X main.version={{.VERSION}}'
          -o out/release/{{.ITEM.OS}}-{{.ITEM.ARCH}}/swallow ./cmd/swallow &&
          tar -czf out/swallow-v{{.VERSION}}-{{.ITEM.OS}}-{{.ITEM.ARCH}}.tar.gz
          -C out/release/{{.ITEM.OS}}-{{.ITEM.ARCH}} swallow
